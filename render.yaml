services:
  - type: web
    name: carinsurance-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carinsurance-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: carinsurance-db
    databaseName: carinsurance_db
    user: carinsurance_user
    plan: free
